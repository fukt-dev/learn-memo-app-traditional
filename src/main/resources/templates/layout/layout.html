<!DOCTYPE html>
<!--
    ============================================
    共通レイアウトテンプレート
    ============================================

    【このファイルの役割】
    全ページで共通のHTMLレイアウト（ヘッダー、フッター、CSSなど）を定義します

    【Thymeleaf Layout Dialect】
    このテンプレートは、Thymeleafのレイアウト機能を使用します
    個別のページは、このレイアウトを継承して作成します

    【使い方】
    各ページのHTMLファイル:
    <html layout:decorate="~{layout/layout}">

    このように指定すると、このlayout.htmlのレイアウトが適用されます
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ja">
<!--
    xmlns:th="http://www.thymeleaf.org"
    → Thymeleafの機能を使うための宣言

    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    → レイアウト機能を使うための宣言

    lang="ja"
    → ページの言語を日本語に設定
-->

<head>
    <!--
        ============================================
        メタ情報
        ============================================
    -->

    <!-- 文字エンコーディング: UTF-8 -->
    <meta charset="UTF-8">

    <!--
        viewport: モバイル対応
        width=device-width: 画面幅に合わせる
        initial-scale=1.0: 初期ズーム倍率を1倍に
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--
        タイトル
        layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE"
        → 個別ページのタイトル + 共通タイトル
        例: "メモ一覧 - メモ帳アプリ"
    -->
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">メモ帳アプリ</title>

    <!--
        ============================================
        CSS
        ============================================
    -->

    <!--
        th:href="@{...}"
        Thymeleafのリンク記法
        @{/css/style.css} → /css/style.css に変換される

        コンテキストパスが設定されている場合も自動的に対応
        例: コンテキストパス = /app の場合
            @{/css/style.css} → /app/css/style.css
    -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!--
        layout:fragment="styles"
        個別ページで追加のCSSを読み込むためのフラグメント
        各ページで以下のように使用:
        <th:block layout:fragment="styles">
            <link rel="stylesheet" th:href="@{/css/page-specific.css}">
        </th:block>
    -->
    <th:block layout:fragment="styles"></th:block>
</head>

<body>
    <!--
        ============================================
        ヘッダー
        ============================================
    -->
    <header>
        <!--
            ナビゲーションバー
        -->
        <nav class="navbar">
            <div class="container">
                <!--
                    アプリケーション名（ロゴ的な扱い）
                    クリックするとトップページ（メモ一覧）に戻る

                    th:href="@{/memos}"
                    → /memos へのリンク
                -->
                <a th:href="@{/memos}" class="navbar-brand">
                    メモ帳アプリ
                </a>

                <!--
                    ナビゲーションリンク
                -->
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <!-- メモ一覧へのリンク -->
                        <a th:href="@{/memos}" class="nav-link">一覧</a>
                    </li>
                    <li class="nav-item">
                        <!-- 新規作成へのリンク -->
                        <a th:href="@{/memos/new}" class="nav-link">新規作成</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <!--
        ============================================
        メインコンテンツ
        ============================================
    -->
    <main class="container">
        <!--
            フラッシュメッセージの表示

            【フラッシュメッセージとは】
            リダイレクト後に一度だけ表示されるメッセージ
            例: "メモを登録しました"

            Controllerで設定:
            redirectAttributes.addFlashAttribute("successMessage", "登録しました");

            th:if="${successMessage}"
            → successMessage が存在する場合のみ表示

            th:text="${successMessage}"
            → successMessage の値を表示
        -->
        <div th:if="${successMessage}" class="alert alert-success">
            <!--
                th:text
                要素のテキスト内容を設定する
                HTMLエスケープが自動的に行われる（XSS対策）
            -->
            <span th:text="${successMessage}"></span>
        </div>

        <!--
            エラーメッセージの表示（フラッシュメッセージ）
        -->
        <div th:if="${errorMessage}" class="alert alert-error">
            <span th:text="${errorMessage}"></span>
        </div>

        <!--
            個別ページのコンテンツ

            layout:fragment="content"
            → 各ページで、この部分が置き換えられる

            例: list.html で定義したコンテンツがここに挿入される
        -->
        <div layout:fragment="content">
            <!-- 個別ページのコンテンツがここに入ります -->
        </div>
    </main>

    <!--
        ============================================
        フッター
        ============================================
    -->
    <footer>
        <div class="container">
            <!--
                th:text="|...|"
                リテラル置換
                |...| で囲むと、文字列として扱われる

                ${#dates.year(#dates.createNow())}
                → 現在の年を取得

                #dates: Thymeleafの日付ユーティリティ
                #dates.createNow(): 現在日時を作成
                #dates.year(...): 年を取得
            -->
            <p th:text="|&copy; ${#dates.year(#dates.createNow())} メモ帳アプリ|">
                &copy; 2025 メモ帳アプリ
            </p>
        </div>
    </footer>

    <!--
        ============================================
        JavaScript
        ============================================
    -->

    <!--
        共通のJavaScriptファイル
    -->
    <script th:src="@{/js/script.js}"></script>

    <!--
        個別ページで追加のJavaScriptを読み込むためのフラグメント
    -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>

<!--
    ============================================
    このレイアウトの使い方（個別ページ側）
    ============================================

    例: list.html

    <!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org"
          xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
          layout:decorate="~{layout/layout}">

    <head>
        <title>メモ一覧</title>
    </head>

    <body>
        <div layout:fragment="content">
            <h1>メモ一覧</h1>
            ...
        </div>
    </body>
    </html>

    レンダリング結果:
    - layout.htmlのヘッダー、フッターが表示される
    - layout:fragment="content" の部分が list.html の内容に置き換わる
    - タイトルは "メモ一覧 - メモ帳アプリ" になる
-->

<!--
    ============================================
    Thymeleafの主な機能
    ============================================

    【1. 変数式: ${...}】
    ${memoDto.title} → memoDtoのtitleプロパティを表示

    【2. リンク式: @{...}】
    @{/memos} → /memos へのリンク
    @{/memos/{id}(id=${memo.id})} → /memos/1 のようなリンク

    【3. メッセージ式: #{...}】
    #{message.key} → messages.propertiesのキーを参照

    【4. 選択変数式: *{...}】
    <div th:object="${memo}">
        <span th:text="*{title}"></span>  ※ ${memo.title} と同じ
    </div>

    【5. 条件分岐: th:if, th:unless】
    <div th:if="${memos.isEmpty()}">メモがありません</div>
    <div th:unless="${memos.isEmpty()}">メモがあります</div>

    【6. 繰り返し: th:each】
    <div th:each="memo : ${memos}">
        <span th:text="${memo.title}"></span>
    </div>

    【7. フォーム: th:object, th:field】
    <form th:object="${memoDto}" th:action="@{/memos}" method="post">
        <input th:field="*{title}" />  ※ name, id, value が自動設定される
    </form>

    【8. エラー表示: th:errors】
    <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
-->
