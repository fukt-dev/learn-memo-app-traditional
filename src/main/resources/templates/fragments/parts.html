<!DOCTYPE html>
<!--
    共通フラグメント集（ヘッダー・フッター）。全画面共通のナビゲーションとフッターを1箇所で定義し、
    各画面が th:replace で「部品」として取り込む。このファイル自体はビューとして返されず、部品だけが参照される。

    学習ポイント:
    - th:fragment / th:replace によるテンプレート共通化の汎用解説 → docs/解説/Spring-MVCとThymeleaf.md
    - なぜ共通化するか（コピペ排除・修正漏れ防止）と th:replace / th:insert の選択 → 下記コメント参照
    - モダン版との対比: React（learn-memo-app-modern）では Layout.tsx などのコンポーネントが同じ役割を担う
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<body>

    <!--
        共通ヘッダー（ナビゲーションバー）。
        th:fragment="siteHeader(activeNav)" で、引数付きの部品として定義する。
        引数 activeNav は「現在表示中の画面のナビリンクをハイライトする」ためのもの:
        'list'→一覧, 'new'→新規作成, null→どれもハイライトしない（詳細・編集・エラー画面）。
        呼び出し側の例: <header th:replace="~{fragments/parts :: siteHeader('list')}"></header>

        【なぜ共通化するか】各 HTML にヘッダーをコピペすると「ナビに1リンク足すだけで5ファイル修正」になり、
        修正漏れ（画面ごとにナビが違う事故）が起きる。1箇所に集約すれば、修正は常にこのファイルだけで済む。
        【th:replace を選ぶ理由】th:replace は呼び出し側の要素ごと部品に置き換える。th:insert だと
        呼び出し側の要素の「中」に挿入されタグが1段増えるため、ここでは th:replace を使う
    -->
    <header th:fragment="siteHeader(activeNav)">
        <nav class="navbar">
            <div class="container">
                <a th:href="@{/memos}" class="navbar-brand">メモ帳アプリ</a>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <!-- th:classappend="式 ? 'active'" は true のときだけ active を足す（false なら何も追加しない） -->
                        <a th:href="@{/memos}"
                           class="nav-link"
                           th:classappend="${activeNav == 'list'} ? 'active'">一覧</a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/memos/new}"
                           class="nav-link"
                           th:classappend="${activeNav == 'new'} ? 'active'">新規作成</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <!--
        共通フッター。引数が不要な部品は th:fragment="siteFooter" と名前だけで定義できる。
        呼び出し側の例: <footer th:replace="~{fragments/parts :: siteFooter}"></footer>
    -->
    <footer th:fragment="siteFooter">
        <div class="container">
            <!--
                |...| はリテラル置換（文字列の中に ${...} を埋め込む記法）。
                #dates.year(#dates.createNow()) で現在の年を出すので、年が変わってもフッターの修正が不要
            -->
            <p th:text="|&copy; ${#dates.year(#dates.createNow())} メモ帳アプリ|">
                &copy; 2025 メモ帳アプリ
            </p>
        </div>
    </footer>

</body>
</html>
