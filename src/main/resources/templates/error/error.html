<!DOCTYPE html>
<!--
    共通エラー画面。GlobalExceptionHandler が例外を捕捉したときに表示される（ビュー名 error/error）。
    Model の ${errorMessage} に例外メッセージが入る。404・400・500 いずれもこの1画面を使い回す。

    学習ポイント:
    - どの例外がどのステータスでここに来るか（ハンドラの優先順位）→ docs/解説/例外処理とエラーページ.md
    - モダン版との対比: 従来型はこのエラー画面（HTML）を返し、モダン版はエラー JSON を返して React が表示する
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エラー - メモ帳アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <!-- 共通ヘッダー。引数 null でどのナビもハイライトしない（部品定義は fragments/parts.html） -->
    <header th:replace="~{fragments/parts :: siteHeader(null)}"></header>

    <main class="container">
        <div class="error-page">
            <div class="error-icon">
                <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="45" stroke="#dc3545" stroke-width="4"/>
                    <path d="M35 35 L65 65 M65 35 L35 65" stroke="#dc3545" stroke-width="4"/>
                </svg>
            </div>

            <h1>エラーが発生しました</h1>

            <!-- errorMessage は GlobalExceptionHandler が設定（例: "メモが見つかりません: id=999"） -->
            <div class="error-message-box">
                <p th:text="${errorMessage}">
                    エラーの詳細がここに表示されます。
                </p>
            </div>

            <div class="error-actions">
                <a th:href="@{/memos}" class="btn btn-primary">
                    トップページに戻る
                </a>

                <!-- ブラウザ履歴を1つ戻る（サーバーを介さないクライアント側だけの操作） -->
                <button onclick="history.back()" class="btn btn-secondary">
                    前のページに戻る
                </button>
            </div>
        </div>
    </main>

    <!-- 共通フッター（部品定義は fragments/parts.html） -->
    <footer th:replace="~{fragments/parts :: siteFooter}"></footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
