<!DOCTYPE html>
<!--
    ============================================
    エラー画面
    ============================================

    【この画面の役割】
    アプリケーションでエラーが発生した場合に表示されます

    【表示されるタイミング】
    - GlobalExceptionHandler で例外がキャッチされた場合
    - メモが見つからない場合（IllegalArgumentException）
    - システムエラーが発生した場合

    【エラーメッセージ】
    Controllerで model.addAttribute("errorMessage", "...") で設定
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エラー - メモ帳アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a th:href="@{/memos}" class="navbar-brand">メモ帳アプリ</a>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a th:href="@{/memos}" class="nav-link">一覧</a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/memos/new}" class="nav-link">新規作成</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="error-page">
            <!-- エラーアイコン -->
            <div class="error-icon">
                <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="45" stroke="#dc3545" stroke-width="4"/>
                    <path d="M35 35 L65 65 M65 35 L35 65" stroke="#dc3545" stroke-width="4"/>
                </svg>
            </div>

            <!-- エラータイトル -->
            <h1>エラーが発生しました</h1>

            <!-- エラーメッセージ -->
            <!--
                th:text="${errorMessage}"
                → GlobalExceptionHandlerで設定されたエラーメッセージを表示

                例:
                - "メモが見つかりません: id=999"
                - "システムエラーが発生しました。時間をおいて再度お試しください。"
            -->
            <div class="error-message-box">
                <p th:text="${errorMessage}">
                    エラーの詳細がここに表示されます。
                </p>
            </div>

            <!-- アクションボタン -->
            <div class="error-actions">
                <!-- トップページに戻る -->
                <a th:href="@{/memos}" class="btn btn-primary">
                    トップページに戻る
                </a>

                <!-- ブラウザバック -->
                <button onclick="history.back()" class="btn btn-secondary">
                    前のページに戻る
                </button>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p th:text="|&copy; ${#dates.year(#dates.createNow())} メモ帳アプリ|">
                &copy; 2025 メモ帳アプリ
            </p>
        </div>
    </footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>

<!--
    ============================================
    その他のエラーページ（オプション）
    ============================================

    Spring Bootは、HTTPステータスコードに応じて、
    特定のエラーページを表示できます

    【404エラーページ】
    src/main/resources/templates/error/404.html

    ページが見つからない場合に表示される

    【500エラーページ】
    src/main/resources/templates/error/500.html

    サーバー内部エラーの場合に表示される

    【403エラーページ】
    src/main/resources/templates/error/403.html

    アクセス権限がない場合に表示される

    【汎用エラーページ】
    src/main/resources/templates/error/error.html（このファイル）

    上記の特定のエラーページがない場合に表示される
-->
