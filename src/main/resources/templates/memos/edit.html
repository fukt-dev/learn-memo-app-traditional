<!DOCTYPE html>
<!--
    ============================================
    メモ編集画面
    ============================================

    【この画面の役割】
    既存のメモを編集するためのフォームを表示します

    【URL】
    GET /memos/{id}/edit

    【POST先】
    POST /memos/{id}/update

    【new.htmlとの違い】
    - フォームの初期値に既存のメモのデータが入っている
    - 送信先が /memos/{id}/update
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編集 - メモ帳アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <!--
        共通ヘッダー（部品の定義は fragments/parts.html を参照）
        引数 null = どのナビリンクもハイライトしない
    -->
    <header th:replace="~{fragments/parts :: siteHeader(null)}"></header>

    <main class="container">
        <h1>メモ編集</h1>

        <!--
            編集フォーム

            th:action="@{/memos/{id}/update(id=${memoDto.id})}"
            → /memos/1/update のようなURLに送信
            {id} が ${memoDto.id} の値に置き換わる

            th:object="${memoDto}"
            → Controllerで取得した既存のメモデータがバインドされている
            model.addAttribute("memoDto", memo)
        -->
        <form th:action="@{/memos/{id}/update(id=${memoDto.id})}"
              th:object="${memoDto}"
              method="post"
              class="memo-form">

            <!-- タイトル入力 -->
            <div class="form-group">
                <label for="title">タイトル</label>
                <!--
                    th:field="*{title}"
                    → memoDto.title の値が初期値として表示される

                    編集画面では、既存のデータが入っている状態
                -->
                <input type="text"
                       th:field="*{title}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                       placeholder="タイトルを入力してください">

                <!-- エラーメッセージ -->
                <span th:if="${#fields.hasErrors('title')}"
                      th:errors="*{title}"
                      class="error-message">
                    エラーメッセージ
                </span>
            </div>

            <!-- 本文入力 -->
            <div class="form-group">
                <label for="content">本文</label>
                <!--
                    <textarea> の場合:
                    th:field="*{content}" により、
                    <textarea>既存の本文がここに入る</textarea>
                    のようにレンダリングされる
                -->
                <textarea th:field="*{content}"
                          class="form-control"
                          th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"
                          rows="10"
                          placeholder="本文を入力してください"></textarea>

                <!-- エラーメッセージ -->
                <span th:if="${#fields.hasErrors('content')}"
                      th:errors="*{content}"
                      class="error-message">
                    エラーメッセージ
                </span>
            </div>

            <!-- メタ情報の表示（編集不可） -->
            <!--
                作成日時や更新日時は編集できないようにする
                表示のみ
            -->
            <div class="form-info">
                <p>
                    <strong>作成日時:</strong>
                    <span th:text="${memoDto.createdAtFormatted}">2025年11月17日 10:30</span>
                </p>
                <p>
                    <strong>更新日時:</strong>
                    <span th:text="${memoDto.updatedAtFormatted}">2025年11月17日 15:45</span>
                </p>
            </div>

            <!-- ボタン -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">更新</button>
                <!--
                    th:href="@{/memos/{id}(id=${memoDto.id})}"
                    → 詳細画面に戻る
                -->
                <a th:href="@{/memos/{id}(id=${memoDto.id})}" class="btn btn-secondary">
                    キャンセル
                </a>
            </div>
        </form>
    </main>

    <!-- 共通フッター（部品の定義は fragments/parts.html を参照） -->
    <footer th:replace="~{fragments/parts :: siteFooter}"></footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>

<!--
    ============================================
    編集の流れ
    ============================================

    1. ユーザーが一覧画面で「編集」をクリック
       → GET /memos/1/edit

    2. MemoController.edit() が呼ばれる
       @GetMapping("/{id}/edit")
       public String edit(@PathVariable Long id, Model model) {
           MemoDto memo = memoService.findById(id);
           model.addAttribute("memoDto", memo);  ← 既存データを取得
           return "memos/edit";
       }

    3. この画面が表示される
       フォームには既存のデータが入っている

    4. ユーザーがデータを編集して「更新」をクリック
       → POST /memos/1/update

    5. MemoController.update() が呼ばれる
       @PostMapping("/{id}/update")
       public String update(
               @PathVariable Long id,
               @Valid MemoDto memoDto,
               BindingResult result) {
           if (result.hasErrors()) {
               return "memos/edit";  ← エラー時は編集画面に戻る
           }
           memoDto.setId(id);  ← IDをセット
           memoService.update(memoDto);
           return "redirect:/memos/" + id;  ← 詳細画面にリダイレクト
       }

    ============================================
    なぜIDをフォームで送らないのか
    ============================================

    セキュリティ上の理由:
    - フォームでIDを送ると、改ざんされる可能性がある
    - ユーザーが別のメモのIDに変更して送信できてしまう

    例:
    <input type="hidden" name="id" value="1">
    → ユーザーがvalue="999"に変更して送信
    → 別のメモが更新されてしまう！

    解決策:
    - IDはURLから取得する（@PathVariable）
    - フォームにはtitleとcontentのみ含める
    - Controllerで @PathVariable Long id として受け取る
    - memoDto.setId(id) でIDを設定する

    ============================================
    バリデーションエラー時の動作
    ============================================

    1. ユーザーが空のタイトルで「更新」をクリック

    2. Controllerでバリデーション実行
       result.hasErrors() == true

    3. 編集画面に戻る
       return "memos/edit"

    4. この画面が再表示される
       - ユーザーが入力した内容は保持されている
       - エラーメッセージが表示される
       - 作成日時・更新日時は、フォームから送信されない（hiddenにしていない）ため、
         MemoController.update() がDBから取り直して再設定している
         （再設定しないと日時欄が空で表示されてしまう）

    重要: IDも同様にフォームからは送信されないため、
         Controller が memoDto.setId(id) で再設定している
         （設定しないとフォームのaction URLが生成できずエラーになる）
-->
