<!DOCTYPE html>
<!--
    メモ編集画面（GET /memos/{id}/edit でフォーム表示 → POST /memos/{id}/update で更新）。
    new.html とほぼ同じ構造で、違いは (1) th:object の memoDto に既存データが入っている
    (2) 送信先が /memos/{id}/update の2点。

    学習ポイント:
    - th:field / th:errors と検証エラー表示 → docs/解説/Bean-Validation.md
    - id や日時をフォームに載せない設計判断 → ページ末尾【なぜ id をフォームで送らないか】コメント参照
    - モダン版との対比: この画面が担う更新を、モダン版では React のフォームが JSON で送って行う
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編集 - メモ帳アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <!-- 共通ヘッダー。引数 null でどのナビもハイライトしない（部品定義は fragments/parts.html） -->
    <header th:replace="~{fragments/parts :: siteHeader(null)}"></header>

    <main class="container">
        <h1>メモ編集</h1>

        <!--
            th:action の {id} が ${memoDto.id} に置き換わり /memos/1/update などになる。
            th:object の memoDto には、Controller が findById で取得した既存データが入っている
        -->
        <form th:action="@{/memos/{id}/update(id=${memoDto.id})}"
              th:object="${memoDto}"
              method="post"
              class="memo-form">

            <div class="form-group">
                <label for="title">タイトル</label>
                <!-- 編集画面では th:field="*{title}" に既存のタイトルが初期値として入る -->
                <input type="text"
                       th:field="*{title}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                       placeholder="タイトルを入力してください">

                <span th:if="${#fields.hasErrors('title')}"
                      th:errors="*{title}"
                      class="error-message">
                    エラーメッセージ
                </span>
            </div>

            <div class="form-group">
                <label for="content">本文</label>
                <textarea th:field="*{content}"
                          class="form-control"
                          th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"
                          rows="10"
                          placeholder="本文を入力してください"></textarea>

                <span th:if="${#fields.hasErrors('content')}"
                      th:errors="*{content}"
                      class="error-message">
                    エラーメッセージ
                </span>
            </div>

            <!--
                作成日時・更新日時は表示のみ（編集不可）。DB 側が管理する値で、フォームからは送らない。
                【落とし穴】title / content 以外はフォームに含めないため、検証エラーで編集画面に戻ると
                この2つの日時欄が空になる。MemoController.update() が DB から取り直して再設定している
                （回帰テスト: MemoControllerTest#refillsTimestamps_whenValidationFails）
            -->
            <div class="form-info">
                <p>
                    <strong>作成日時:</strong>
                    <span th:text="${memoDto.createdAtFormatted}">2025年11月17日 10:30</span>
                </p>
                <p>
                    <strong>更新日時:</strong>
                    <span th:text="${memoDto.updatedAtFormatted}">2025年11月17日 15:45</span>
                </p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">更新</button>
                <!-- キャンセルは詳細画面へ戻るリンク -->
                <a th:href="@{/memos/{id}(id=${memoDto.id})}" class="btn btn-secondary">
                    キャンセル
                </a>
            </div>
        </form>
    </main>

    <!-- 共通フッター（部品定義は fragments/parts.html） -->
    <footer th:replace="~{fragments/parts :: siteFooter}"></footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>

<!--
    【なぜ id をフォームで送らないか】
    更新対象の特定は URL パス（@PathVariable）に一本化し、フォームには title / content だけを含める。
    id を <input type="hidden" name="id"> でも送ると「URL の id とフォームの id が食い違ったとき
    どちらが正か」という曖昧さが生まれるため、入力源を 1 つに絞って事故を防ぐ設計。
    注意: URL パスの id も利用者が自由に書き換えられるので、URL に移すこと自体は改ざん対策には
    ならない。実務で他人のデータへの更新を防ぐには、サーバー側の認可チェック（その id は
    操作してよい相手か）が別途必須。本アプリはログイン機能のない学習用のため実装していない。
    Controller は memoDto.setId(id) で URL の id を再設定する
    （再設定しないと、次回の action URL 生成に使う memoDto.id が無くエラーになる）
-->
