<!DOCTYPE html>
<!--
    メモ新規作成画面（GET /memos/new でフォーム表示 → POST /memos で登録）。
    th:object でフォーム全体を空の memoDto にバインドし、送信値を Controller が @Valid で検証する。

    学習ポイント:
    - th:object / th:field / th:errors / #fields と検証エラー表示 → docs/解説/Bean-Validation.md
    - Thymeleaf 一般（@{} リンク・自動エスケープ・Natural Templating）→ docs/解説/Spring-MVCとThymeleaf.md
    - モダン版との対比: この登録フォームは、モダン版では React のフォームが入力値を JSON で POST する（edit.html と対）
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規作成 - メモ帳アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <!-- 共通ヘッダー。引数 'new' で「新規作成」ナビに active が付く（部品定義は fragments/parts.html） -->
    <header th:replace="~{fragments/parts :: siteHeader('new')}"></header>

    <main class="container">
        <h1>メモ新規作成</h1>

        <!--
            th:object="${memoDto}" でこのフォームを memoDto にバインドする。
            以降は th:field="*{title}" のように *{...} で各フィールドを簡潔に指定できる。
            Controller は new MemoDto() を "memoDto" として Model に載せている
        -->
        <form th:action="@{/memos}" th:object="${memoDto}" method="post" class="memo-form">

            <div class="form-group">
                <label for="title">タイトル</label>
                <!--
                    th:field="*{title}" は id / name / value を自動生成し、memoDto.title にバインドする。
                    th:classappend で、エラー時だけ is-invalid クラスを足して赤枠にする
                    （#fields.hasErrors / th:errors の詳細 → docs/解説/Bean-Validation.md）
                -->
                <input type="text"
                       th:field="*{title}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                       placeholder="タイトルを入力してください">

                <!-- th:errors が MemoDto の @NotBlank / @Size に書いた message を表示する -->
                <span th:if="${#fields.hasErrors('title')}"
                      th:errors="*{title}"
                      class="error-message">
                    エラーメッセージ
                </span>
            </div>

            <div class="form-group">
                <label for="content">本文</label>
                <!-- textarea では th:field の値は value 属性ではなく、タグ内のテキストとして入る -->
                <textarea th:field="*{content}"
                          class="form-control"
                          th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"
                          rows="10"
                          placeholder="本文を入力してください"></textarea>

                <span th:if="${#fields.hasErrors('content')}"
                      th:errors="*{content}"
                      class="error-message">
                    エラーメッセージ
                </span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">登録</button>
                <!-- キャンセルは送信ではなく、一覧へ戻るリンク -->
                <a th:href="@{/memos}" class="btn btn-secondary">キャンセル</a>
            </div>
        </form>
    </main>

    <!-- 共通フッター（部品定義は fragments/parts.html） -->
    <footer th:replace="~{fragments/parts :: siteFooter}"></footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
