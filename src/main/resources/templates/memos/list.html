<!DOCTYPE html>
<!--
    ============================================
    メモ一覧画面
    ============================================

    【この画面の役割】
    登録されているメモの一覧を表示します

    【URL】
    GET /memos

    【表示内容】
    - メモの一覧（タイトル、作成日時）
    - 新規作成ボタン
    - 検索フォーム
    - フラッシュメッセージ（登録・更新・削除の成功メッセージ）
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<!--
    xmlns:th="http://www.thymeleaf.org"
    → Thymeleafの機能を使うための宣言
-->

<head>
    <!-- ============================================
         メタ情報
         ============================================ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メモ一覧 - メモ帳アプリ</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!--
        th:href="@{/css/style.css}"
        Thymeleafのリンク記法
        @{...} を使うことで、コンテキストパスが自動的に付加される
    -->
</head>

<body>
    <!-- ============================================
         ヘッダー
         ============================================ -->
    <header>
        <nav class="navbar">
            <div class="container">
                <a th:href="@{/memos}" class="navbar-brand">メモ帳アプリ</a>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a th:href="@{/memos}" class="nav-link active">一覧</a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/memos/new}" class="nav-link">新規作成</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- ============================================
         メインコンテンツ
         ============================================ -->
    <main class="container">
        <!-- ========================================
             フラッシュメッセージ
             ======================================== -->
        <!--
            th:if="${successMessage}"
            → successMessage が存在する場合のみ、この要素を表示

            フラッシュメッセージは、Controllerでリダイレクト時に設定される:
            redirectAttributes.addFlashAttribute("successMessage", "登録しました");

            リロードすると消える（フラッシュスコープ）
        -->
        <div th:if="${successMessage}" class="alert alert-success">
            <!--
                th:text="${successMessage}"
                → successMessage の値を要素のテキストとして表示
                HTMLエスケープが自動的に行われる
            -->
            <span th:text="${successMessage}"></span>
        </div>

        <!-- ========================================
             ページタイトル
             ======================================== -->
        <h1>メモ一覧</h1>

        <!-- ========================================
             検索フォーム
             ======================================== -->
        <div class="search-box">
            <!--
                th:action="@{/memos}"
                → フォームの送信先を /memos に設定（検索機能統合）

                method="get"
                → GETメソッドでリクエストを送信
                検索はデータを変更しないのでGETを使用

                【RESTful設計】
                /memos/search ではなく /memos?keyword=xxx を使用
                一覧表示と検索が同じエンドポイントで統一される
            -->
            <form th:action="@{/memos}" method="get">
                <div class="form-group">
                    <!--
                        name="keyword"
                        → このinputの値が、クエリパラメータ keyword として送信される
                        例: /memos/search?keyword=買い物

                        th:value="${keyword}"
                        → 検索後、入力したキーワードを表示したままにする
                        Controllerで model.addAttribute("keyword", keyword) していれば設定される
                    -->
                    <input
                        type="text"
                        name="keyword"
                        th:value="${keyword}"
                        placeholder="キーワードを入力"
                        class="form-control">

                    <button type="submit" class="btn btn-primary">検索</button>
                </div>
            </form>
        </div>

        <!-- ========================================
             新規作成ボタン
             ======================================== -->
        <div class="action-bar">
            <!--
                th:href="@{/memos/new}"
                → /memos/new へのリンク
            -->
            <a th:href="@{/memos/new}" class="btn btn-success">新規作成</a>
        </div>

        <!-- ========================================
             メモ一覧
             ======================================== -->
        <!--
            th:if="${memos.isEmpty()}"
            → memos が空の場合のみ表示

            ${memos.isEmpty()}
            → memosリストが空かどうかを判定
            Java の List.isEmpty() メソッドを呼び出している
        -->
        <div th:if="${memos.isEmpty()}" class="empty-state">
            <p>メモがありません</p>
            <p>
                <a th:href="@{/memos/new}" class="btn btn-primary">最初のメモを作成する</a>
            </p>
        </div>

        <!--
            th:unless="${memos.isEmpty()}"
            → memos が空でない場合のみ表示

            th:unless は th:if の逆（否定）
        -->
        <div th:unless="${memos.isEmpty()}" class="memo-list">
            <!--
                th:each="memo : ${memos}"
                → memosリストの各要素について繰り返し

                【動作】
                for (Memo memo : memos) {
                    // この<div>ブロックを繰り返す
                }

                のようなイメージ

                【変数】
                memo → 現在の要素（1つのメモ）
                ${memos} → リスト全体

                【ステータス変数（オプション）】
                th:each="memo, iterStat : ${memos}"
                iterStat.index → 0始まりのインデックス
                iterStat.count → 1始まりの個数
                iterStat.first → 最初の要素かどうか
                iterStat.last → 最後の要素かどうか
            -->
            <div th:each="memo : ${memos}" class="memo-item">
                <!--
                    メモアイテムの内容
                -->
                <div class="memo-header">
                    <h2 class="memo-title">
                        <!--
                            th:href="@{/memos/{id}(id=${memo.id})}"
                            → URLパスパラメータを使ったリンク

                            【動作】
                            /memos/{id} の {id} の部分が memo.id の値に置き換わる
                            例: memo.id = 1 の場合 → /memos/1

                            (id=${memo.id})
                            → パスパラメータの値を指定

                            【複数のパラメータ】
                            @{/memos/{id}/edit(id=${memo.id}, mode='edit')}
                            → /memos/1/edit?mode=edit
                        -->
                        <a th:href="@{/memos/{id}(id=${memo.id})}" th:text="${memo.title}">
                            メモのタイトル
                        </a>
                        <!--
                            th:text="${memo.title}"
                            → memo.getTitle() の値をテキストとして表示

                            "メモのタイトル" はデフォルト値（HTMLをそのまま開いた時に表示される）
                            Thymeleafで処理されると、th:text の値に置き換わる
                        -->
                    </h2>

                    <div class="memo-meta">
                        <!--
                            作成日時の表示

                            ${memo.createdAtFormatted}
                            → MemoDto の createdAtFormatted フィールド
                            MemoDtoで既にフォーマット済み（"2025年11月17日 10:30"）
                        -->
                        <span class="memo-date" th:text="${memo.createdAtFormatted}">
                            2025年11月17日 10:30
                        </span>
                    </div>
                </div>

                <!--
                    メモの本文プレビュー
                -->
                <div class="memo-content-preview">
                    <!--
                        th:text="${#strings.abbreviate(memo.content, 100)}"
                        → メモの本文を100文字に省略して表示

                        #strings: Thymeleafの文字列ユーティリティ
                        #strings.abbreviate(文字列, 最大長)
                        → 文字列を指定した長さに省略（末尾に"..."が付く）

                        例:
                        元の文字列: "これは長い文章です。100文字を超える場合は省略されます。..."
                        結果: "これは長い文章です。100文字を超える場合は省略..."
                    -->
                    <p th:text="${#strings.abbreviate(memo.content, 100)}">
                        メモの内容がここに表示されます...
                    </p>
                </div>

                <!--
                    アクションボタン
                -->
                <div class="memo-actions">
                    <!-- 詳細表示リンク -->
                    <a th:href="@{/memos/{id}(id=${memo.id})}" class="btn btn-sm btn-info">
                        詳細
                    </a>

                    <!-- 編集リンク -->
                    <a th:href="@{/memos/{id}/edit(id=${memo.id})}" class="btn btn-sm btn-primary">
                        編集
                    </a>

                    <!-- 削除フォーム -->
                    <!--
                        削除はPOSTメソッドで送信する
                        なぜか: GETは安全な操作のみ（データを変更しない）
                        削除はデータを変更するのでPOSTを使う
                    -->
                    <form th:action="@{/memos/{id}/delete(id=${memo.id})}" method="post" style="display: inline;">
                        <!--
                            onclick="return confirm('本当に削除しますか？')"
                            → 削除前に確認ダイアログを表示

                            return confirm(...)
                            → ユーザーが「OK」を押したら true、「キャンセル」を押したら false
                            false の場合、フォームは送信されない
                        -->
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('本当に削除しますか？')">
                            削除
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- ============================================
         フッター
         ============================================ -->
    <footer>
        <div class="container">
            <!--
                th:text="|&copy; ${#dates.year(#dates.createNow())} メモ帳アプリ|"
                → リテラル置換

                |...| で囲むと、文字列リテラルとして扱われる
                その中に ${...} を含めることができる

                ${#dates.year(#dates.createNow())}
                → 現在の年を取得

                #dates: 日付ユーティリティ
                #dates.createNow(): 現在日時を作成
                #dates.year(...): 年を取得

                結果: "© 2025 メモ帳アプリ"
            -->
            <p th:text="|&copy; ${#dates.year(#dates.createNow())} メモ帳アプリ|">
                &copy; 2025 メモ帳アプリ
            </p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script th:src="@{/js/script.js}"></script>
</body>
</html>

<!--
    ============================================
    Controllerとの連携
    ============================================

    MemoController.java:

    @GetMapping("")
    public String list(Model model) {
        List<MemoDto> memos = memoService.findAll();
        model.addAttribute("memos", memos);  ← この値が ${memos} として参照できる
        return "memos/list";  ← このHTMLファイルを表示
    }

    ============================================
    データの流れ
    ============================================

    1. ユーザーがブラウザで /memos にアクセス

    2. MemoController.list() が呼ばれる

    3. ServiceからList<MemoDto>を取得

    4. model.addAttribute("memos", memos) で Modelに設定

    5. このHTMLテンプレートがレンダリングされる

    6. ${memos} が実際のデータに置き換わる

    7. 完成したHTMLがブラウザに返される

    ============================================
    Thymeleafのデバッグ
    ============================================

    【1. ログで確認】
    application.yml:
    logging:
      level:
        org.thymeleaf: DEBUG

    → Thymeleafの処理内容がログに出力される

    【2. ブラウザの開発者ツール】
    - F12 → Elements → レンダリング後のHTMLを確認
    - th:if が false の場合、要素が存在しない
    - th:text の値が正しく設定されているか確認

    【3. エラーページ】
    - 変数が存在しない場合、エラーページが表示される
    - エラーメッセージで原因を確認
-->
