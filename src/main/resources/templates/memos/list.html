<!DOCTYPE html>
<!--
    メモ一覧画面（GET /memos）。登録済みメモの一覧・検索フォーム・新規作成ボタンを表示する。
    3層でいうプレゼンテーション層の出力（サーバーサイドレンダリング）で、Controller が Model に
    載せた ${memos} を、このテンプレートが HTML に変換する。

    学習ポイント:
    - th:each / th:if / th:text / @{} リンク・自動エスケープなどの汎用解説 → docs/解説/Spring-MVCとThymeleaf.md
    - モダン版との対比: この画面の役割は、モダン版では React の一覧ページが JSON を受けて描画する
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メモ一覧 - メモ帳アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <!-- 共通ヘッダー。引数 'list' で「一覧」ナビに active が付く（部品定義は fragments/parts.html） -->
    <header th:replace="~{fragments/parts :: siteHeader('list')}"></header>

    <main class="container">
        <!--
            フラッシュメッセージ。Controller が redirectAttributes.addFlashAttribute(...) で渡した
            登録・更新・削除の成功メッセージを、リダイレクト後の1回だけ表示する（フラッシュスコープ。リロードで消える）
        -->
        <div th:if="${successMessage}" class="alert alert-success">
            <span th:text="${successMessage}"></span>
        </div>

        <h1>メモ一覧</h1>

        <!--
            検索フォーム。送信先を専用の /memos/search ではなく、一覧と同じ /memos?keyword=... に統一している。
            「一覧表示と検索を同一エンドポイントにまとめる」設計判断（空キーワードなら全件、を Service 側が吸収）。
            検索はデータを変更しないので method="get"
        -->
        <div class="search-box">
            <form th:action="@{/memos}" method="get">
                <div class="form-group">
                    <!-- th:value で検索後もキーワードを入力欄に残す（Controller が model に keyword を戻している前提） -->
                    <input
                        type="text"
                        name="keyword"
                        th:value="${keyword}"
                        placeholder="キーワードを入力"
                        class="form-control">

                    <button type="submit" class="btn btn-primary">検索</button>
                </div>
            </form>
        </div>

        <div class="action-bar">
            <a th:href="@{/memos/new}" class="btn btn-success">新規作成</a>
        </div>

        <!-- メモが0件のときだけ表示（下の th:unless はこの否定） -->
        <div th:if="${memos.isEmpty()}" class="empty-state">
            <p>メモがありません</p>
            <p>
                <a th:href="@{/memos/new}" class="btn btn-primary">最初のメモを作成する</a>
            </p>
        </div>

        <div th:unless="${memos.isEmpty()}" class="memo-list">
            <!-- ${memos} の各要素を memo として繰り返す。"memo, iterStat : ${memos}" とすれば index/count/first/last も取れる -->
            <div th:each="memo : ${memos}" class="memo-item">
                <div class="memo-header">
                    <h2 class="memo-title">
                        <a th:href="@{/memos/{id}(id=${memo.id})}" th:text="${memo.title}">
                            メモのタイトル
                        </a>
                        <!-- 「メモのタイトル」は Natural Templating 用のダミー。実行時は th:text の値に置き換わる -->
                    </h2>

                    <div class="memo-meta">
                        <!-- createdAtFormatted は MemoDto 側で整形済みの文字列（"2025年11月17日 10:30"） -->
                        <span class="memo-date" th:text="${memo.createdAtFormatted}">
                            2025年11月17日 10:30
                        </span>
                    </div>
                </div>

                <div class="memo-content-preview">
                    <!-- #strings.abbreviate(文字列, 最大長): 一覧では本文を100文字に省略して表示（末尾に "..."） -->
                    <p th:text="${#strings.abbreviate(memo.content, 100)}">
                        メモの内容がここに表示されます...
                    </p>
                </div>

                <div class="memo-actions">
                    <a th:href="@{/memos/{id}(id=${memo.id})}" class="btn btn-sm btn-info">
                        詳細
                    </a>
                    <a th:href="@{/memos/{id}/edit(id=${memo.id})}" class="btn btn-sm btn-primary">
                        編集
                    </a>

                    <!--
                        削除は「データを変更する操作」なので GET リンクではなく POST フォームにする。
                        削除前の確認ダイアログは script.js の initDeleteConfirmation() が
                        action に "/delete" を含むフォームの submit を監視して出す。
                        【落とし穴】ここに onclick="return confirm(...)" を足すと JS 側のリスナーと二重になり、
                        確認ダイアログが2回表示される。書いてはいけない
                    -->
                    <form th:action="@{/memos/{id}/delete(id=${memo.id})}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-sm btn-danger">
                            削除
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- 共通フッター（部品定義は fragments/parts.html） -->
    <footer th:replace="~{fragments/parts :: siteFooter}"></footer>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
